# Nginx reverse proxy for BundleScan (handoff §3/§10). Cloudflare sits in front;
# this terminates locally and proxies to the Next server on :3000.
# Copy to /etc/nginx/sites-available/bundlescan and symlink into sites-enabled.

server {
    listen 80;
    server_name bundlescan.io www.bundlescan.io;

    # Let Cloudflare/your ACME client handle TLS; redirect plain HTTP.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name bundlescan.io www.bundlescan.io;

    ssl_certificate     /etc/letsencrypt/live/bundlescan.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bundlescan.io/privkey.pem;

    # Preserve the real client IP for Scout rate limiting (lib/http.ts).
    real_ip_header CF-Connecting-IP;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
