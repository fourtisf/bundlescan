<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Concept A — "Signal": radar-ping diamond. The detected flag pip from the
       product nav, scaled up. Reads as alert / something surfaced. -->
  <defs>
    <linearGradient id="e" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E87A6A"/>
      <stop offset="1" stop-color="#D9594A"/>
    </linearGradient>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <g transform="rotate(45 128 128)">
    <rect x="40" y="40" width="176" height="176" rx="16" fill="none" stroke="#4A4844" stroke-width="4"/>
    <rect x="76" y="76" width="104" height="104" rx="14" fill="none" stroke="#D9594A" stroke-width="4" opacity="0.5"/>
    <rect x="98" y="98" width="60" height="60" rx="12" fill="#D9594A" filter="url(#g)" opacity="0.7"/>
    <rect x="98" y="98" width="60" height="60" rx="12" fill="url(#e)"/>
  </g>
</svg>
