<svg xmlns="http://www.w3.org/2000/svg" width="720" height="180" viewBox="0 0 720 180">
  <defs>
    <linearGradient id="e" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E87A6A"/>
      <stop offset="1" stop-color="#D9594A"/>
    </linearGradient>
    <filter id="g" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <!-- mark -->
  <g transform="rotate(45 90 90)">
    <rect x="34" y="34" width="112" height="112" rx="14" fill="none" stroke="#4A4844" stroke-width="3"/>
    <rect x="58" y="58" width="64" height="64" rx="11" fill="none" stroke="#D9594A" stroke-width="3" opacity="0.5"/>
    <rect x="70" y="70" width="40" height="40" rx="9" fill="#D9594A" filter="url(#g)" opacity="0.7"/>
    <rect x="70" y="70" width="40" height="40" rx="9" fill="url(#e)"/>
  </g>
  <!-- two-tone wordmark -->
  <text x="200" y="84" font-family="'Clash Display','Segoe UI',Arial,sans-serif"
        font-weight="700" font-size="60" letter-spacing="-2">
    <tspan fill="#ECE9E2">Bundle</tspan><tspan fill="#D9594A">Scan</tspan>
  </text>
  <!-- tagline -->
  <text x="202" y="124" font-family="'Geist Mono',ui-monospace,monospace"
        font-size="16" letter-spacing="6" fill="#84817C">LAUNCH FORENSICS · SOLANA</text>
</svg>
