<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="e" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#E87A6A"/><stop offset="1" stop-color="#D9594A"/></linearGradient>
    <filter id="g" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="9"/></filter>
    <radialGradient id="bg" cx="0.82" cy="0.22" r="0.75"><stop offset="0" stop-color="#D9594A" stop-opacity="0.18"/><stop offset="1" stop-color="#D9594A" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1600" height="900" fill="#08080A"/>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- faint diamond motif right -->
  <g transform="translate(1270 470) rotate(45)" opacity="0.16">
    <rect x="-220" y="-220" width="440" height="440" rx="40" fill="none" stroke="#4A4844" stroke-width="4"/>
    <rect x="-140" y="-140" width="280" height="280" rx="32" fill="none" stroke="#D9594A" stroke-width="4"/>
    <rect x="-66" y="-66" width="132" height="132" rx="20" fill="url(#e)"/>
  </g>

  <!-- logo -->
  <g transform="translate(90 70)">
    <g transform="translate(20 20) rotate(45)">
      <rect x="-18" y="-18" width="36" height="36" rx="6" fill="none" stroke="#4A4844" stroke-width="2.5"/>
      <rect x="-10" y="-10" width="20" height="20" rx="5" fill="url(#e)"/>
    </g>
    <text x="54" y="29" font-family="'Clash Display','Segoe UI',Arial,sans-serif" font-weight="700" font-size="29" fill="#ECE9E2">BundleScan</text>
  </g>

  <!-- headline -->
  <text x="90" y="400" font-family="'Clash Display','Segoe UI',Arial,sans-serif" font-weight="600" font-size="82" letter-spacing="-2" fill="#ECE9E2">The launch was</text>
  <text x="86" y="540" font-family="'Clash Display','Segoe UI',Arial,sans-serif" font-weight="700" font-size="150" letter-spacing="-4" fill="#D9594A">rigged</text>
  <text x="90" y="660" font-family="'Clash Display','Segoe UI',Arial,sans-serif" font-weight="600" font-size="82" letter-spacing="-2" fill="#ECE9E2">before you bought.</text>

  <text x="94" y="730" font-family="'Geist Mono',ui-monospace,monospace" font-size="22" letter-spacing="7" fill="#84817C">BLOCK-ZERO LAUNCH FORENSICS · SOLANA</text>
  <text x="1510" y="846" text-anchor="end" font-family="'Geist Mono',ui-monospace,monospace" font-size="22" letter-spacing="3" fill="#84817C">bundlescan.fun</text>
</svg>
