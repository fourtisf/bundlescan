<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="e" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#E87A6A"/><stop offset="1" stop-color="#D9594A"/></linearGradient>
    <linearGradient id="scale" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D9594A"/><stop offset="0.26" stop-color="#E87A6A"/>
      <stop offset="0.62" stop-color="#B0AEA7"/><stop offset="1" stop-color="#7FA894"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.1" r="0.7"><stop offset="0" stop-color="#D9594A" stop-opacity="0.12"/><stop offset="1" stop-color="#D9594A" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1600" height="900" fill="#08080A"/>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <g transform="translate(90 70)">
    <g transform="translate(20 20) rotate(45)">
      <rect x="-18" y="-18" width="36" height="36" rx="6" fill="none" stroke="#4A4844" stroke-width="2.5"/>
      <rect x="-10" y="-10" width="20" height="20" rx="5" fill="url(#e)"/>
    </g>
    <text x="54" y="29" font-family="'Clash Display','Segoe UI',Arial,sans-serif" font-weight="700" font-size="29" fill="#ECE9E2">BundleScan</text>
  </g>

  <text x="90" y="220" font-family="'Geist Mono',ui-monospace,monospace" font-size="20" letter-spacing="7" fill="#84817C">THE LAUNCH HEALTH SCORE</text>
  <text x="90" y="320" font-family="'Clash Display','Segoe UI',Arial,sans-serif" font-weight="600" font-size="78" letter-spacing="-2" fill="#ECE9E2">One score for how</text>
  <text x="90" y="408" font-family="'Clash Display','Segoe UI',Arial,sans-serif" font-weight="600" font-size="78" letter-spacing="-2" fill="#ECE9E2">loaded the gun is.</text>

  <!-- scale bar -->
  <rect x="90" y="486" width="1420" height="14" rx="7" fill="url(#scale)"/>

  <!-- tiers -->
  <g font-family="'Clash Display','Segoe UI',Arial,sans-serif">
    <!-- TRAP -->
    <g transform="translate(8 8)"><rect x="90" y="556" width="18" height="18" rx="3" transform="rotate(45 99 565)" fill="#D9594A"/></g>
    <text x="126" y="582" font-weight="600" font-size="34" fill="#ECE9E2">TRAP</text>
    <text x="90" y="624" font-family="'Geist Mono',monospace" font-size="19" fill="#4A4844">0 – 24</text>
    <text x="90" y="664" font-family="'Switzer',Arial,sans-serif" font-size="18" fill="#84817C">Majority insider supply,</text>
    <text x="90" y="690" font-family="'Switzer',Arial,sans-serif" font-size="18" fill="#84817C">single funder. A dump is</text>
    <text x="90" y="716" font-family="'Switzer',Arial,sans-serif" font-size="18" fill="#84817C">the base case.</text>

    <!-- RIGGED -->
    <rect x="453" y="564" width="18" height="18" rx="3" transform="rotate(45 462 573)" fill="#E87A6A"/>
    <text x="481" y="582" font-weight="600" font-size="34" fill="#ECE9E2">RIGGED</text>
    <text x="445" y="624" font-family="'Geist Mono',monospace" font-size="19" fill="#4A4844">25 – 54</text>
    <text x="445" y="664" font-family="'Switzer',Arial,sans-serif" font-size="18" fill="#84817C">Insiders hold a real share</text>
    <text x="445" y="690" font-family="'Switzer',Arial,sans-serif" font-size="18" fill="#84817C">from block zero. You're</text>
    <text x="445" y="716" font-family="'Switzer',Arial,sans-serif" font-size="18" fill="#84817C">exit liquidity.</text>

    <!-- MILD -->
    <rect x="808" y="564" width="18" height="18" rx="3" transform="rotate(45 817 573)" fill="#B0AEA7"/>
    <text x="836" y="582" font-weight="600" font-size="34" fill="#ECE9E2">MILD</text>
    <text x="800" y="624" font-family="'Geist Mono',monospace" font-size="19" fill="#4A4844">55 – 79</text>
    <text x="800" y="664" font-family="'Switzer',Arial,sans-serif" font-size="18" fill="#84817C">Some coordination, but</text>
    <text x="800" y="690" font-family="'Switzer',Arial,sans-serif" font-size="18" fill="#84817C">supply is mostly out in</text>
    <text x="800" y="716" font-family="'Switzer',Arial,sans-serif" font-size="18" fill="#84817C">the open market.</text>

    <!-- CLEAN -->
    <rect x="1163" y="564" width="18" height="18" rx="3" transform="rotate(45 1172 573)" fill="#7FA894"/>
    <text x="1191" y="582" font-weight="600" font-size="34" fill="#ECE9E2">CLEAN</text>
    <text x="1155" y="624" font-family="'Geist Mono',monospace" font-size="19" fill="#4A4844">80 – 100</text>
    <text x="1155" y="664" font-family="'Switzer',Arial,sans-serif" font-size="18" fill="#84817C">Organic distribution.</text>
    <text x="1155" y="690" font-family="'Switzer',Arial,sans-serif" font-size="18" fill="#84817C">Minimal bundling, no</text>
    <text x="1155" y="716" font-family="'Switzer',Arial,sans-serif" font-size="18" fill="#84817C">insider cluster.</text>
  </g>

  <text x="1510" y="846" text-anchor="end" font-family="'Geist Mono',ui-monospace,monospace" font-size="22" letter-spacing="3" fill="#84817C">bundlescan.fun</text>
</svg>
