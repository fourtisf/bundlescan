<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <!-- X/Twitter header (1500×500), Live Terminal theme. Key content sits in the
       upper/right safe band so the profile avatar (bottom-left) and mobile crop
       don't cover the logo or headline. Terminal card bleeds off the right edge. -->
  <defs>
    <linearGradient id="e" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E87A6A"/><stop offset="1" stop-color="#D9594A"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.7" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#D9594A" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#D9594A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1500" height="500" fill="#08080A"/>
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- logo lockup (top-left, clear of avatar) -->
  <g transform="translate(80 70)">
    <g transform="translate(18 18) rotate(45)">
      <rect x="-17" y="-17" width="34" height="34" rx="6" fill="none" stroke="#4A4844" stroke-width="2.5"/>
      <rect x="-9.5" y="-9.5" width="19" height="19" rx="5" fill="url(#e)"/>
    </g>
    <text x="52" y="27" font-family="'Clash Display','Segoe UI',Arial,sans-serif" font-weight="700" font-size="29" letter-spacing="-0.5" fill="#ECE9E2">BundleScan</text>
  </g>

  <!-- headline (center band) -->
  <text x="82" y="248" font-family="'Clash Display','Segoe UI',Arial,sans-serif" font-weight="600" font-size="62" letter-spacing="-2.2" fill="#ECE9E2">Every launch, <tspan fill="#D9594A" font-weight="700">X-rayed live.</tspan></text>
  <text x="86" y="300" font-family="'Geist Mono',ui-monospace,monospace" font-size="18" letter-spacing="6" fill="#84817C">BLOCK-ZERO LAUNCH FORENSICS · SOLANA</text>

  <!-- url (bottom-right safe corner) -->
  <text x="1420" y="456" text-anchor="end" font-family="'Geist Mono',ui-monospace,monospace" font-size="20" letter-spacing="2" fill="#84817C">bundlescan.fun/terminal</text>

  <!-- compact live-terminal card, bleeds off the right edge -->
  <g>
    <rect x="980" y="86" width="600" height="300" rx="16" fill="#0A0A0C" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
    <!-- title bar -->
    <line x1="980" y1="134" x2="1500" y2="134" stroke="rgba(255,255,255,.055)" stroke-width="1"/>
    <rect x="1006" y="104" width="10" height="10" rx="2.5" transform="rotate(45 1011 109)" fill="#D9594A"/>
    <text x="1028" y="114" font-family="'Clash Display','Segoe UI',Arial,sans-serif" font-weight="600" font-size="15" fill="#ECE9E2">BundleScan</text>
    <text x="1112" y="113" font-family="'Geist Mono',ui-monospace,monospace" font-size="10" letter-spacing="3" fill="#4A4844">LIVE TERMINAL</text>
    <circle cx="1232" cy="109" r="4" fill="#D9594A"/>
    <text x="1246" y="113" font-family="'Geist Mono',ui-monospace,monospace" font-size="10" letter-spacing="2.5" fill="#84817C">LIVE</text>

    <!-- ROW 1 · TRAP -->
    <g font-family="'Geist Mono',ui-monospace,monospace" font-size="15">
      <text x="1006" y="186" fill="#ECE9E2">$MOONPAD</text>
      <g transform="translate(1150 176)">
        <rect x="0"  width="14" height="11" rx="3" fill="#D9594A"/>
        <rect x="19" width="14" height="11" rx="3" fill="#22222A"/>
        <rect x="38" width="14" height="11" rx="3" fill="#22222A"/>
        <rect x="57" width="14" height="11" rx="3" fill="#22222A"/>
        <rect x="76" width="14" height="11" rx="3" fill="#22222A"/>
      </g>
      <text x="1296" y="186" text-anchor="end" fill="#D9594A" font-weight="500">9</text>
      <text x="1330" y="186" fill="#D9594A" letter-spacing="1">TRAP</text>
    </g>
    <line x1="1006" y1="208" x2="1500" y2="208" stroke="rgba(255,255,255,.03)" stroke-width="1"/>

    <!-- ROW 2 · RIGGED -->
    <g font-family="'Geist Mono',ui-monospace,monospace" font-size="15">
      <text x="1006" y="252" fill="#ECE9E2">$WAGMI</text>
      <g transform="translate(1150 242)">
        <rect x="0"  width="14" height="11" rx="3" fill="#D9594A"/>
        <rect x="19" width="14" height="11" rx="3" fill="#D9594A"/>
        <rect x="38" width="14" height="11" rx="3" fill="#22222A"/>
        <rect x="57" width="14" height="11" rx="3" fill="#22222A"/>
        <rect x="76" width="14" height="11" rx="3" fill="#22222A"/>
      </g>
      <text x="1296" y="252" text-anchor="end" fill="#E87A6A" font-weight="500">24</text>
      <text x="1330" y="252" fill="#E87A6A" letter-spacing="1">RIGGED</text>
    </g>
    <line x1="1006" y1="274" x2="1500" y2="274" stroke="rgba(255,255,255,.03)" stroke-width="1"/>

    <!-- ROW 3 · CLEAN -->
    <g font-family="'Geist Mono',ui-monospace,monospace" font-size="15">
      <text x="1006" y="318" fill="#ECE9E2">$VERDE</text>
      <g transform="translate(1150 308)">
        <rect x="0"  width="14" height="11" rx="3" fill="#7FA894"/>
        <rect x="19" width="14" height="11" rx="3" fill="#7FA894"/>
        <rect x="38" width="14" height="11" rx="3" fill="#7FA894"/>
        <rect x="57" width="14" height="11" rx="3" fill="#7FA894"/>
        <rect x="76" width="14" height="11" rx="3" fill="#7FA894"/>
      </g>
      <text x="1296" y="318" text-anchor="end" fill="#7FA894" font-weight="500">88</text>
      <text x="1330" y="318" fill="#7FA894" letter-spacing="1">CLEAN</text>
    </g>

    <!-- command footer -->
    <line x1="980" y1="346" x2="1500" y2="346" stroke="rgba(255,255,255,.055)" stroke-width="1"/>
    <text x="1006" y="370" font-family="'Geist Mono',ui-monospace,monospace" font-size="12" fill="#84817C"><tspan fill="#7FA894">&gt;</tspan> scoring launch health</text>
    <rect x="1196" y="360" width="7" height="12" fill="#D9594A"/>
  </g>
</svg>
