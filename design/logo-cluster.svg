<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Concept C — "Cluster": wallet grid with the insider cluster lit ember.
       Most supply muted/organic, a connected ember cluster = captured supply.
       Maps directly to BundleScan's core output. -->
  <defs>
    <linearGradient id="e" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E87A6A"/>
      <stop offset="1" stop-color="#D9594A"/>
    </linearGradient>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>
  <!-- muted (organic) cells -->
  <g fill="#37363F">
    <rect x="44"  y="44"  width="36" height="36" rx="9"/>
    <rect x="188" y="44"  width="36" height="36" rx="9"/>
    <rect x="44"  y="92"  width="36" height="36" rx="9"/>
    <rect x="188" y="92"  width="36" height="36" rx="9"/>
    <rect x="44"  y="140" width="36" height="36" rx="9"/>
    <rect x="188" y="140" width="36" height="36" rx="9"/>
    <rect x="44"  y="188" width="36" height="36" rx="9"/>
    <rect x="92"  y="188" width="36" height="36" rx="9"/>
    <rect x="140" y="188" width="36" height="36" rx="9"/>
    <rect x="188" y="188" width="36" height="36" rx="9"/>
    <rect x="92"  y="44"  width="36" height="36" rx="9"/>
  </g>
  <!-- ember (insider) cluster -->
  <g>
    <rect x="140" y="44"  width="36" height="36" rx="9" fill="#D9594A" filter="url(#g)" opacity="0.6"/>
    <g fill="url(#e)">
      <rect x="140" y="44"  width="36" height="36" rx="9"/>
      <rect x="92"  y="92"  width="36" height="36" rx="9"/>
      <rect x="140" y="92"  width="36" height="36" rx="9"/>
      <rect x="92"  y="140" width="36" height="36" rx="9"/>
      <rect x="140" y="140" width="36" height="36" rx="9"/>
    </g>
  </g>
</svg>
