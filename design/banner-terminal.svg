<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <!-- Live Terminal promo banner (1600×900). Built on the prototype's monochrome
       + ember system (globals.css). Left column = pitch, right column = a faithful
       mock of the /terminal live feed. Render: node design/render-banner.mjs -->
  <defs>
    <linearGradient id="e" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E87A6A"/><stop offset="1" stop-color="#D9594A"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D9594A"/><stop offset="1" stop-color="#E87A6A"/>
    </linearGradient>
    <filter id="g" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <radialGradient id="bg" cx="0.78" cy="0.16" r="0.72">
      <stop offset="0" stop-color="#D9594A" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#D9594A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="panelglow" cx="0.5" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#D9594A" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#D9594A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="#08080A"/>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- ───────────── LEFT · PITCH ───────────── -->
  <!-- logo lockup -->
  <g transform="translate(96 98)">
    <g transform="translate(18 18) rotate(45)">
      <rect x="-17" y="-17" width="34" height="34" rx="6" fill="none" stroke="#4A4844" stroke-width="2.5"/>
      <rect x="-9.5" y="-9.5" width="19" height="19" rx="5" fill="url(#e)"/>
    </g>
    <text x="52" y="27" font-family="'Clash Display','Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" letter-spacing="-0.5" fill="#ECE9E2">BundleScan</text>
  </g>

  <!-- eyebrow -->
  <g transform="translate(98 232)">
    <circle cx="5" cy="-5" r="5" fill="#D9594A"/>
    <text x="24" y="0" font-family="'Geist Mono',ui-monospace,monospace" font-size="18" letter-spacing="6" fill="#84817C">LIVE TERMINAL · REAL-TIME</text>
  </g>

  <!-- headline -->
  <text x="92" y="360" font-family="'Clash Display','Segoe UI',Arial,sans-serif" font-weight="600" font-size="86" letter-spacing="-3" fill="#ECE9E2">Every launch,</text>
  <text x="90" y="452" font-family="'Clash Display','Segoe UI',Arial,sans-serif" font-weight="700" font-size="86" letter-spacing="-3" fill="#D9594A">X-rayed live.</text>

  <!-- subcopy -->
  <text x="96" y="520" font-family="'Switzer','Segoe UI',Arial,sans-serif" font-size="23" fill="#84817C">Every Solana mint, replayed from block zero — bundles,</text>
  <text x="96" y="556" font-family="'Switzer','Segoe UI',Arial,sans-serif" font-size="23" fill="#84817C">snipers and insider supply, scored the second it deploys.</text>

  <!-- CTA pill -->
